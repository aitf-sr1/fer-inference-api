volumes:
  ssl_data:

services:
  generate-certs:
    image: alpine:latest
    volumes:
      - ssl_data:/ssl
      - ./scripts/generate-certs.sh:/generate-certs.sh:ro
    entrypoint:
      ["sh", "-c", "apk add --no-cache openssl && sh /generate-certs.sh"]
    environment:
      - SSL_DIR=/ssl

  api:
    build: .
    volumes:
      - ./models:/app/models:ro
      - ./assets:/app/assets:ro
    env_file: .env
    restart: unless-stopped

  nginx:
    image: nginx:stable-alpine
    ports:
      - "${HOST_PORT:-8001}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ssl_data:/etc/nginx/ssl:ro
    depends_on:
      generate-certs:
        condition: service_completed_successfully
      api:
        condition: service_started
    restart: unless-stopped
