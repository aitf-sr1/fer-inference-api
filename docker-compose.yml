volumes:
  ssl_data:

services:
  generate-certs:
    image: alpine:latest
    volumes:
      - ssl_data:/ssl
      - ./scripts/generate-certs.sh:/generate-certs.sh:ro
    entrypoint: ["sh", "/generate-certs.sh"]
    environment:
      - SSL_DIR=/ssl

  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./models/model.onnx:/app/models/model.onnx:ro
      - ./assets:/app/assets:ro
    environment:
      - MODEL_PATH=/app/models/model.onnx
      - BLAZEFACE_MODEL_PATH=/app/assets/blaze_face_short_range.onnx
      - LOG_LEVEL=info
    restart: unless-stopped

  nginx:
    image: nginx:stable-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ssl_data:/etc/nginx/ssl:ro
    depends_on:
      generate-certs:
        condition: service_completed_successfully
      api:
        condition: service_started
    restart: unless-stopped
